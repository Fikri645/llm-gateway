# Self-hosted Langfuse for the hosted trace UI + cost/latency dashboards.
# The gateway works WITHOUT this (local JSONL traces + /metrics); bring it up
# only for the visual observability layer.
#   docker compose up -d
#   open http://localhost:3000  → create project → copy keys into .env:
#     LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY
services:
  langfuse-db:
    image: postgres:16
    container_name: gw-langfuse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2          # v2 = single container + Postgres
    container_name: gw-langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-me
      SALT: dev-salt-change-me
      TELEMETRY_ENABLED: "false"

volumes:
  langfuse-pgdata:
